        function getFilteredData() {
            if (currentTheme === 'all') {
                return [...data[0], ...data[1], ...data[2]];
            } else {
                return data[parseInt(currentTheme)];
            }
        }

        function renderNeta(neta) {
            if (!neta) {
                netaContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">✨</div>
                        <p class="empty-text">テーマを選んで、ネタを見つけましょう</p>
                    </div>
                `;
                counter.textContent = '';
                return;
            }

            const filteredData = getFilteredData();
            const idx = filteredData.indexOf(neta);
            const totalCount = filteredData.length;

            netaContainer.innerHTML = `
                <div>
                    <h2 class="neta-title">${neta.title}</h2>
                    <div class="neta-intro">${neta.intro}</div>
                    <div class="neta-section">
                        <div class="neta-section-title">書くべきポイント</div>
                        <ul class="neta-points">
                            ${neta.points.split('\n').map(point => `<li>${point}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="neta-question">✏️ ${neta.question}</div>
                </div>
            `;

            counter.textContent = `${idx + 1} / ${totalCount}`;
        }

        function showRandomNeta() {
            const filteredData = getFilteredData();
            if (filteredData.length === 0) return;
            currentNeta = filteredData[Math.floor(Math.random() * filteredData.length)];
            currentIndex = 0;
            renderNeta(currentNeta);
            netaContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function showNextNeta() {
            const filteredData = getFilteredData();
            if (filteredData.length === 0) return;
            currentIndex = (currentIndex + 1) % filteredData.length;
            currentNeta = filteredData[currentIndex];
            renderNeta(currentNeta);
            netaContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        themeButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                themeButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTheme = this.dataset.theme;
                currentIndex = 0;
                currentNeta = null;
                renderNeta(null);
                counter.textContent = '';
            });
        });

        randomBtn.addEventListener('click', showRandomNeta);
        nextBtn.addEventListener('click', showNextNeta);
